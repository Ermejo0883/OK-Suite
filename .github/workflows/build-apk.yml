name: Build Android AAB — OK Suite PDF

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Keystore ──────────────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android-project/signingKey.keystore
          chmod 600 android-project/signingKey.keystore

      # ── Build AAB + APK ───────────────────────────────────────
      - name: Build AAB + APK
        working-directory: android-project
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease \
            "-Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android-project/signingKey.keystore" \
            "-Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD" \
            "-Pandroid.injected.signing.key.alias=oksuite-pdf" \
            "-Pandroid.injected.signing.key.password=$KEY_PASSWORD"

      # ── Artifacts ─────────────────────────────────────────────
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: ok-suite-pdf-aab-v${{ github.run_number }}
          path: android-project/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ok-suite-pdf-apk-v${{ github.run_number }}
          path: android-project/app/build/outputs/apk/release/*.apk
          retention-days: 30
